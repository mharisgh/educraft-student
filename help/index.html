<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Educraft Help Center</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link href="../output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    />

    <style>
      .active {
        background-color: #fa9d53;
      }

      .help-backdrop {
        transition: opacity 320ms ease;
      }

      .help-drawer {
        transition:
          transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 320ms ease;
      }

      .help-scrollbar::-webkit-scrollbar {
        width: 10px;
      }

      .help-scrollbar::-webkit-scrollbar-track {
        background: #fff7ef;
      }

      .help-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(248, 116, 11, 0.28);
        border-radius: 999px;
        border: 2px solid #fff7ef;
      }

      .help-ph-icon-shell {
        align-items: center;
        display: inline-flex;
        flex: 0 0 auto;
        justify-content: center;
      }
      iconify-icon.help-ph-icon {
        align-items: center;
        color: #bf4b00;
        display: inline-flex;
        justify-content: center;
        line-height: 1;
        vertical-align: middle;
      }
      iconify-icon.help-ph-icon svg {
        display: block;
      }
      #helpDrawerContent .text-3xl {
        font-size: 1.6rem;
        line-height: 2rem;
      }

      #helpDrawerContent .text-2xl {
        font-size: 1.35rem;
        line-height: 1.8rem;
      }

      #helpDrawerContent .text-xl {
        font-size: 1.08rem;
        line-height: 1.5rem;
      }

      #helpDrawerContent .text-lg {
        font-size: 1rem;
        line-height: 1.45rem;
      }

      #helpDrawerContent .text-base {
        font-size: 0.9rem;
        line-height: 1.45rem;
      }

      #helpDrawerContent .text-sm {
        font-size: 0.82rem;
        line-height: 1.3rem;
      }

      #helpDrawerContent .text-xs {
        font-size: 0.74rem;
        line-height: 1.1rem;
      }
    </style>
  </head>

  <body
    class="flex min-h-screen overflow-hidden bg-primaryLight font-sans text-slate-900"
  >
    <aside
      id="sidebar"
      class="z-50 hidden h-screen w-72 text-white transition-all duration-300 ease-out lg:block bg-primary"
    >
      <div
        class="flex h-full flex-col justify-between overflow-y-auto px-4 scrollbar-custom"
      >
        <div>
          <div id="sidemenu-logo" class="mt-4 flex items-center gap-2">
            <img
              src="../assets/img/educraft-logo-white.svg"
              alt="educraft logo"
            />
            <span id="logo-text" class="text-2xl font-bold">EduCraft</span>
          </div>

          <div id="toggle-btn-area" class="flex w-full justify-end py-4">
            <button id="toggleBtn" class="rounded-lg bg-white/20 p-2">
              <img
                class="h-3 w-3"
                src="../assets/icons/small.svg"
                alt="menu expand button"
              />
            </button>
          </div>

          <nav class="flex flex-col justify-between">
            <ul class="flex flex-col gap-1">
              <a href="../index.html">
                <li
                  id="sidemenu-list"
                  class="sidemenu-list flex h-12 cursor-pointer items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
                >
                  <div class="flex gap-4">
                    <img
                      class="h-6 w-6"
                      src="../assets/icons/home.svg"
                      alt="home"
                    />
                    <span class="sidebar-text">Home</span>
                  </div>
                </li>
              </a>

              <a href="../mycourses.html">
                <li
                  id="sidemenu-list"
                  class="sidemenu-list flex h-12 cursor-pointer items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
                >
                  <div class="flex items-center gap-4">
                    <img
                      class="h-6 w-6"
                      src="../assets/icons/my-courses.svg"
                      alt="courses"
                    />
                    <span class="sidebar-text">Courses</span>
                  </div>
                </li>
              </a>

              <a href="../learning-journey.html">
                <li
                  id="sidemenu-list"
                  class="sidemenu-list flex h-12 cursor-pointer items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
                >
                  <div class="flex items-center gap-4">
                    <img
                      class="h-6 w-6"
                      src="../assets/icons/learning-journey.svg"
                      alt="learning journey"
                    />
                    <span class="sidebar-text">Learning Journey</span>
                  </div>
                </li>
              </a>

              <a href="../classroom.html">
                <li
                  id="sidemenu-list"
                  class="sidemenu-list flex h-12 cursor-pointer items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
                >
                  <div class="flex items-center gap-4">
                    <img
                      class="h-6 w-6"
                      src="../assets/icons/clasroom.svg"
                      alt="classroom"
                    />
                    <span class="sidebar-text">Classroom</span>
                  </div>
                </li>
              </a>
            </ul>
          </nav>
        </div>

        <div>
          <button
            id="educat-sidemenu-sm"
            class="hidden w-full items-center justify-center rounded-lg bg-white py-2 text-primaryDark"
          >
            <img src="../assets/icons/help.svg" alt="open help" />
          </button>

          <nav class="pb-4">
            <ul class="flex flex-col gap-1">
              <li
                id="sidemenu-list"
                class="active sidemenu-list mb-2 flex h-12 cursor-pointer items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
              >
                <button
                  type="button"
                  data-help-open
                  class="flex w-full items-center gap-4 text-left"
                >
                  <img
                    class="h-6 w-6"
                    src="../assets/icons/help.svg"
                    alt="help"
                  />
                  <span class="sidebar-text">Help</span>
                </button>
              </li>

              <li class="h-[2px] w-full bg-white/20"></li>

              <li
                id="sidemenu-list"
                class="sidemenu-list flex h-12 items-center rounded-xl pl-4 transition-all duration-300 ease-out hover:bg-[#fa9d53]"
              >
                <a href="#" class="flex items-center gap-4">
                  <img
                    class="h-6 w-6"
                    src="../assets/icons/logout.svg"
                    alt="logout"
                  />
                  <span class="sidebar-text">Logout</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </aside>

    <div class="relative flex h-screen w-full flex-col overflow-hidden">
      <header
        id="header-menu"
        class="flex h-16 items-center justify-between border-b border-black/10 bg-white px-4 transition-all duration-300 ease-out lg:px-6"
      >
        <div class="flex items-center gap-3">
          <button id="hamburger" class="text-primaryDark lg:hidden">
            <svg
              class="h-6 w-6"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16m-7 6h7"
              ></path>
            </svg>
          </button>
          <div>
            <p class="text-xl font-semibold text-slate-950">Help Center</p>
          </div>
        </div>

        <div class="hidden items-center gap-3 lg:flex">
          <button
            id="fullscreenToggle"
            class="flex h-10 w-10 items-center justify-center rounded-full bg-[#fdf0e7] transition hover:bg-[#ffe6d6]"
          >
            <img src="../assets/icons/fullscreen.svg" alt="fullscreen" />
          </button>
          <button
            data-help-open
            type="button"
            class="inline-flex items-center gap-2 rounded-full bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:bg-primaryDark"
          >
            <img
              src="../assets/icons/help.svg"
              alt=""
              class="h-4 w-4 brightness-[10] saturate-0"
            />
            Open Help Center
          </button>
        </div>
      </header>

      <main
        id="main"
        class="relative flex h-[calc(100vh-4rem)] overflow-hidden"
      >
        <section
          class="relative flex-1 overflow-y-auto px-4 py-6 lg:px-8 lg:py-8"
        ></section>
      </main>
    </div>

    <div
      id="helpDrawerBackdrop"
      data-open="false"
      class="help-backdrop pointer-events-none fixed inset-0 z-[90] bg-black/30 opacity-0"
    ></div>

    <aside
      id="helpDrawer"
      data-open="false"
      class="help-drawer fixed right-0 top-0 z-[110] flex h-screen w-full max-w-[860px] translate-x-full flex-col overflow-hidden border-l border-[#ecdcca] bg-white shadow-[-24px_0_70px_rgba(15,23,42,0.15)]"
    >
      <div class="border-b border-[#eee4da] bg-white px-5 pb-5 pt-5 lg:px-8">
        <div class="flex items-center justify-between gap-4">
          <div>
            <p
              class="text-xs font-semibold uppercase tracking-[0.24em] text-primaryDark/75"
            >
              Help Center
            </p>
          </div>
          <button
            id="helpDrawerClose"
            type="button"
            class="flex h-8 w-8 items-center justify-center rounded-full border border-[#eadcca] bg-white transition hover:border-primary hover:text-primaryDark"
          >
            <img
              src="../assets/icons/close-line.svg"
              alt="close help"
              class="h-5 w-5"
            />
          </button>
        </div>

        <div class="mt-5 flex items-center gap-3">
          <button
            id="helpDrawerBack"
            type="button"
            class="hidden shrink-0 items-center gap-2 px-1 py-1 text-sm font-medium text-slate-500 transition hover:text-primaryDark"
          >
            <img
              src="../assets/icons/arrow-left.svg"
              alt="back"
              class="h-4 w-4"
            />
            <span>Back</span>
          </button>

          <div
            class="min-w-0 flex-1 rounded-[28px] border border-[#f2d3b8] bg-[#fffdfa] p-2 shadow-[0_12px_30px_rgba(248,116,11,0.06)]"
          >
            <label
              for="helpSearchInput"
              class="flex items-center gap-3 rounded-[22px] bg-white px-3 py-1"
            >
              <img
                src="../assets/icons/search-bar.svg"
                alt="search"
                class="h-5 w-5 opacity-60"
              />
              <input
                id="helpSearchInput"
                type="search"
                placeholder="Find your answer"
                class="w-full border-0 bg-transparent text-sm text-slate-900 outline-none placeholder:text-slate-400 "
              />
            </label>
          </div>
        </div>
      </div>

      <div
        id="helpDrawerContent"
        class="help-scrollbar flex-1 overflow-y-auto bg-[#fffaf2]"
      ></div>
    </aside>

    <button
      id="helpLauncher"
      type="button"
      data-help-open
      class="fixed bottom-6 right-6 z-[80] inline-flex items-center gap-3 rounded-full bg-primary px-5 py-4 text-sm font-semibold text-white shadow-[0_18px_40px_rgba(248,116,11,0.35)] transition duration-300 hover:bg-primaryDark lg:bottom-8 lg:right-8"
    >
      <img
        src="../assets/icons/help.svg"
        alt=""
        class="h-5 w-5 brightness-[10] saturate-0"
      />
      Help Center
    </button>

    <div
      id="menu"
      class="menu fixed right-0 top-0 z-[100] hidden h-screen w-full bg-primaryLight p-4 shadow-lg lg:hidden"
    >
      <button
        id="close-menu"
        class="absolute right-4 top-4 text-lg text-primaryDark"
      >
        x
      </button>
      <ul
        id="menu-items"
        class="flex h-full flex-col items-center space-y-8 pt-[20vh]"
      ></ul>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/help-center.js"></script>
  </body>
</html>
